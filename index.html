<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#121a2e" />
  <meta name="description" content="Airplane Shooter — a simple browser arcade game. Drag to move, auto-fire, shoot the incoming planes." />
  <title>Airplane Shooter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud">
    <span id="score">0</span>
    <span id="best">Best 0</span>
  </div>

  <div id="hint">Drag (or use ← → / A D) to move · you fire automatically</div>

  <script src="game.js"></script>
</body>
</html>
